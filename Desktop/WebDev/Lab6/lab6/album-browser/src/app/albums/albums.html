<div class="albums-page">
  <div class="page-header">
    <h1>📂 All Albums</h1>
    <span class="album-count" *ngIf="!loading">{{ albums.length }} albums</span>
  </div>

  <div class="loading-spinner" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading albums...</p>
  </div>

  <div class="albums-grid" *ngIf="!loading">
    <div
      class="album-card"
      *ngFor="let album of albums"
      [routerLink]="['/albums', album.id]"
    >
      <div class="album-id">#{{ album.id }}</div>
      <p class="album-title">{{ album.title }}</p>
      <div class="album-footer">
        <span class="user-badge">User {{ album.userId }}</span>
        <button
          class="btn-delete"
          (click)="deleteAlbum(album.id, $event)"
          title="Delete album"
        >🗑️ Delete</button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && albums.length === 0">
    <p>No albums found.</p>
  </div>
</div>
